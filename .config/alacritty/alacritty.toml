import = [
    "~/.config/alacritty/themes/themes/gruvbox_dark.toml"
]



[cursor.style]
blinking = "Off"
shape = "Underline"

[cursor.vi_mode_style]
shape="Beam" 
blinking="On"  

[window.padding]
x = 1
y = 0

[window]
opacity=0.9
blur=true

[font]
size = 8
normal = {family = "JetBrainsMono Nerd Font Mono", style = "Regular"}

[mouse]
hide_when_typing = true


